name: Deploy StoneOS

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region to deploy into
        required: true
        default: us-east-1

env:
  AWS_REGION: ${{ inputs.aws_region }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://stoneos:stoneos_ci@127.0.0.1:5432/stoneos?schema=legacy_migration_test
      STONEOS_ALLOW_WORKFLOW_SMOKE_TRUNCATE: "1"
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stoneos
          POSTGRES_PASSWORD: stoneos_ci
          POSTGRES_DB: stoneos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stoneos -d stoneos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - name: Validate release configuration
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ] || [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "Configure NEXT_PUBLIC_API_URL and NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY before deployment."
            exit 1
          fi
      - name: Validate and apply migrations
        run: |
          npx prisma validate --schema packages/backend/prisma/schema.prisma
          npx prisma generate --schema packages/backend/prisma/schema.prisma
          npx prisma migrate deploy --schema packages/backend/prisma/schema.prisma
      - name: Verify backend
        run: |
          npm test --workspace=packages/backend -- --silent
          npm run build --workspace=packages/backend
      - name: Verify frontend
        run: |
          node --test packages/frontend/lib/routePolicy.test.ts
          npx tsc --noEmit -p packages/frontend/tsconfig.json
          npm run build --workspace=packages/frontend

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check deployment secrets
        run: |
          missing=0
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then echo "Missing AWS_ACCESS_KEY_ID"; missing=1; fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then echo "Missing AWS_SECRET_ACCESS_KEY"; missing=1; fi
          if [ -z "${{ secrets.NEXT_PUBLIC_API_URL }}" ]; then echo "Missing NEXT_PUBLIC_API_URL"; missing=1; fi
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then echo "Missing NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"; missing=1; fi
          if [ "$missing" -ne 0 ]; then
            echo "Configure the missing GitHub Actions secrets before running this manual deploy."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t "$REGISTRY/stoneos-backend:${{ github.sha }}" -t "$REGISTRY/stoneos-backend:latest" ./packages/backend
          docker push "$REGISTRY/stoneos-backend:${{ github.sha }}"
          docker push "$REGISTRY/stoneos-backend:latest"

      - name: Build and push frontend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            --build-arg "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            -t "$REGISTRY/stoneos-frontend:${{ github.sha }}" -t "$REGISTRY/stoneos-frontend:latest" ./packages/frontend
          docker push "$REGISTRY/stoneos-frontend:${{ github.sha }}"
          docker push "$REGISTRY/stoneos-frontend:latest"

      # App Runner auto-redeploys on new "latest" pushes ONLY if the
      # service was created with auto-deployments enabled. If not,
      # uncomment below (needs the App Runner service ARNs as secrets).
      # - name: Trigger App Runner redeploy (backend)
      #   run: aws apprunner start-deployment --service-arn ${{ secrets.APPRUNNER_BACKEND_ARN }}
      # - name: Trigger App Runner redeploy (frontend)
      #   run: aws apprunner start-deployment --service-arn ${{ secrets.APPRUNNER_FRONTEND_ARN }}
