name: StoneOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stoneos-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://stoneos:stoneos_ci@127.0.0.1:5432/stoneos?schema=legacy_migration_test
  STONEOS_ALLOW_WORKFLOW_SMOKE_TRUNCATE: "1"
  NEXT_PUBLIC_API_URL: http://localhost:4000
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stoneos
          POSTGRES_PASSWORD: stoneos_ci
          POSTGRES_DB: stoneos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stoneos -d stoneos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check frontend build configuration
        run: |
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "Configure NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY as a repository secret."
            exit 1
          fi

      - name: Validate and generate Prisma client
        run: |
          npx prisma validate --schema packages/backend/prisma/schema.prisma
          npx prisma generate --schema packages/backend/prisma/schema.prisma

      - name: Apply migrations to isolated PostgreSQL schema
        run: npx prisma migrate deploy --schema packages/backend/prisma/schema.prisma

      - name: Backend tests
        run: npm test --workspace=packages/backend -- --silent

      - name: Backend build
        run: npm run build --workspace=packages/backend

      - name: Frontend route policy tests
        run: node --test packages/frontend/lib/routePolicy.test.ts

      - name: Frontend typecheck
        run: npx tsc --noEmit -p packages/frontend/tsconfig.json

      - name: Frontend production build
        run: npm run build --workspace=packages/frontend

  production-images:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build backend production image
        run: docker build -t stoneos-backend:ci ./packages/backend

      - name: Build frontend production image
        run: >-
          docker build
          --build-arg NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          -t stoneos-frontend:ci ./packages/frontend
