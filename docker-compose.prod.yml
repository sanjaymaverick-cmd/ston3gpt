version: "3.9"
# Smoke-test the ACTUAL production images locally before pushing to AWS.
# This is not for day-to-day development (use docker-compose.yml at the
# repo root + `npm run dev:*` for that, which is faster iteration).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build
#   then hit http://localhost:3000 and http://localhost:4000

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stoneos
      POSTGRES_PASSWORD: stoneos_dev_only
      POSTGRES_DB: stoneos
    ports:
      - "5432:5432"
    volumes:
      - stoneos_prod_test_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stoneos -d stoneos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./packages/backend
    environment:
      DATABASE_URL: postgresql://stoneos:stoneos_dev_only@postgres:5432/stoneos
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./packages/frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  stoneos_prod_test_pg:
